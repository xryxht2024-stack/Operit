name: Cleanup
on: [workflow_dispatch]
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete heavy modules
        run: |
          git config user.name bot
          git config user.email bot@x.com
          rm -rf dragonbones/ fbx/ mmd/ mnn/ llama/ showerclient/ examples/ docs/
          rm -rf app/src/main/cpp/ app/src/main/jniLibs/
          rm -rf app/src/main/java/androidx/
          rm -rf app/src/main/java/com/k2fsa/
          rm -rf app/src/main/java/com/ai/assistance/operit/core/avatar/
          rm -rf app/src/main/java/com/ai/assistance/operit/core/chat/
          rm -rf app/src/main/java/com/ai/assistance/operit/core/workflow/
          rm -rf app/src/main/java/com/ai/assistance/operit/api/chat/
          rm -rf app/src/main/java/com/ai/assistance/operit/api/speech/
          rm -rf app/src/main/java/com/ai/assistance/operit/api/voice/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/backup/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/collects/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/converter/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/exporter/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/mnn/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/skill/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/updates/
          rm -rf app/src/main/java/com/ai/assistance/operit/data/announcement/
          rm -rf app/src/main/java/com/ai/assistance/operit/integrations/externalchat/
          rm -rf app/src/main/java/com/ai/assistance/operit/integrations/intent/
          rm -rf app/src/main/java/com/ai/assistance/operit/integrations/tasker/
          rm -rf app/src/main/java/com/ai/assistance/operit/plugins/
          rm -rf app/src/main/java/com/ai/assistance/operit/ui/features/
          rm -rf app/src/main/java/com/ai/assistance/operit/ui/floating/
          rm -rf app/src/main/java/com/ai/assistance/operit/widget/
          git add -A
          git commit -m "chore: strip to core skeleton" || echo "nothing to commit"
          git push
